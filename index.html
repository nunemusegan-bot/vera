<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Собери сердечки для Веры</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            touch-action: manipulation;
            user-select: none;
        }
        canvas { background: #fff; border: 3px solid #ff4081; border-radius: 10px; display: none; max-width: 100%; }
        #startScreen, #endScreen {
            text-align: center; background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 0 30px rgba(255,64,129,0.3); max-width: 350px;
        }
        #endScreen { display: none; }
        button {
            background: #ff4081; color: white; border: none; padding: 15px 40px;
            font-size: 20px; border-radius: 50px; cursor: pointer; margin-top: 20px; width: 100%;
        }
        .heart-icon { font-size: 50px; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        p { font-size: 18px; color: #555; margin: 8px 0; }
        h2 { color: #ff4081; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="startScreen">
    <div class="heart-icon">🧺</div>
    <h2>Игра для Веры</h2>
    <p>Лови сердечки 💖<br>Уворачивайся от кактусов 🌵</p>
    <p style="font-size:14px; color:#888;">Двигай пальцем по экрану<br>Собери 30 сердечек — там сюрприз 😉</p>
    <button id="startBtn">▶ Играть</button>
</div>

<div id="endScreen">
    <div class="heart-icon">💖</div>
    <h2 id="endTitle">Вера, ты невероятна!</h2>
    <p id="endMsg">Ты собрала все сердечки!</p>
    <p>🌸 Ты самая нежная и добрая</p>
    <p>💋 Твоя улыбка — моё солнце</p>
    <p>🤗 Ты делаешь мир лучше</p>
    <p>💖 Спасибо, что ты есть!</p>
    <button id="restartBtn">🔄 Ещё разок</button>
</div>

<canvas id="gameCanvas" width="360" height="500"></canvas>

<script>
(function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    
    const startScreen = document.getElementById('startScreen');
    const endScreen = document.getElementById('endScreen');
    const endTitle = document.getElementById('endTitle');
    const endMsg = document.getElementById('endMsg');

    let basket, hearts = [], cacti = [], score, gameRunning, winScore = 30;
    let gameEnded = false;

    class Basket {
        constructor() { 
            this.w = 60; 
            this.h = 40; 
            this.x = W/2 - 30; 
            this.y = H - 70; 
        }
        draw() {
            ctx.font = '40px Arial';
            ctx.fillText('🧺', this.x, this.y + this.h);
        }
        contains(px, py) {
            // Проверяем, что точка (px, py) внутри корзинки
            return px > this.x && px < this.x + this.w &&
                   py > this.y && py < this.y + this.h;
        }
    }

    class Heart {
        constructor() {
            this.x = Math.random() * (W - 30);
            this.y = -30;
            this.speed = 2 + Math.random() * 2;
        }
        update() { this.y += this.speed; }
        draw() { 
            ctx.font = '26px Arial'; 
            ctx.fillText('💖', this.x, this.y); 
        }
    }

    class Cactus {
        constructor() {
            this.x = Math.random() * (W - 30);
            this.y = -30;
            this.speed = 2 + Math.random() * 2;
        }
        update() { this.y += this.speed; }
        draw() { 
            ctx.font = '26px Arial'; 
            ctx.fillText('🌵', this.x, this.y); 
        }
    }

    function startGame() {
        startScreen.style.display = 'none';
        endScreen.style.display = 'none';
        canvas.style.display = 'block';
        basket = new Basket();
        hearts = []; cacti = []; score = 0;
        gameRunning = true; gameEnded = false;
    }

    function endGame(won) {
        if (gameEnded) return;
        gameEnded = true; 
        gameRunning = false;
        canvas.style.display = 'none';
        endScreen.style.display = 'block';
        if (won) {
            endTitle.innerText = 'Вера, ты невероятна!';
            endMsg.innerText = 'Ты собрала все сердечки! 💖';
        } else {
            endTitle.innerText = 'Почти!';
            endMsg.innerText = 'Попробуй ещё разок 💪';
        }
    }

    function gameLoop() {
        if (!gameRunning) return;
        ctx.clearRect(0, 0, W, H);

        basket.draw();

        // Спавн сердечек чаще
        if (Math.random() < 0.04) hearts.push(new Heart());
        // Спавн кактусов реже
        if (Math.random() < 0.015) cacti.push(new Cactus());

        // Обработка сердечек
        for (let i = hearts.length-1; i >= 0; i--) {
            hearts[i].update(); 
            hearts[i].draw();
            
            // Упало ниже экрана — удаляем
            if (hearts[i].y > H + 50) { 
                hearts.splice(i, 1); 
                continue; 
            }
            
            // Проверка попадания в корзинку
            if (basket.contains(hearts[i].x + 13, hearts[i].y + 13)) {
                hearts.splice(i, 1); 
                score++;
            }
        }

        // Обработка кактусов
        for (let i = cacti.length-1; i >= 0; i--) {
            cacti[i].update(); 
            cacti[i].draw();
            
            // Упало ниже экрана
            if (cacti[i].y > H + 50) { 
                cacti.splice(i, 1); 
                continue; 
            }
            
            // Столкновение с корзинкой — поражение
            if (basket.contains(cacti[i].x + 13, cacti[i].y + 13)) {
                endGame(false); 
                return;
            }
        }

        // Счёт
        ctx.fillStyle = '#ff4081'; 
        ctx.font = 'bold 22px Arial';
        ctx.fillText(`💖 ${score}/${winScore}`, 15, 30);

        // Победа
        if (score >= winScore) { 
            endGame(true); 
            return; 
        }
        
        requestAnimationFrame(gameLoop);
    }

    // Управление пальцем
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        let touch = e.touches[0];
        let rect = canvas.getBoundingClientRect();
        let x = touch.clientX - rect.left;
        if (basket && gameRunning) basket.x = Math.max(0, Math.min(W - basket.w, x - basket.w/2));
    });
    canvas.addEventListener('mousemove', e => {
        let rect = canvas.getBoundingClientRect();
        let x = e.clientX - rect.left;
        if (basket && gameRunning) basket.x = Math.max(0, Math.min(W - basket.w, x - basket.w/2));
    });

    document.getElementById('startBtn').onclick = () => { 
        startGame(); 
        requestAnimationFrame(gameLoop); 
    };
    document.getElementById('restartBtn').onclick = () => { 
        startGame(); 
        requestAnimationFrame(gameLoop); 
    };
})();
</script>
</body>
</html>
